<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>따릉이 맵 — 서울 실시간 자전거</title>
<meta name="description" content="서울시 따릉이 실시간 자전거 잔여대수 + 고도 시각화 지도">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: rgba(15,23,42,.88);
  --bg-solid: #0f172a;
  --surface: rgba(30,41,59,.92);
  --text: #f1f5f9;
  --text-dim: #94a3b8;
  --accent: #3b82f6;
  --green: #22c55e;
  --orange: #f97316;
  --red: #ef4444;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;overflow:hidden}
#map{width:100vw;height:100vh}

/* Glass panels */
.glass{
  position:absolute;z-index:1000;
  background:var(--bg);color:var(--text);
  border-radius:var(--radius);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.06);
}

/* Header */
.header{
  top:16px;left:16px;right:16px;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.header-left{display:flex;align-items:center;gap:10px}
.logo{font-size:24px;line-height:1}
.header h1{font-size:16px;font-weight:700;letter-spacing:-.02em}
.header .status{font-size:12px;color:var(--text-dim);font-weight:400}
.header .status .live{color:var(--green);font-weight:600}
.header .status .offline{color:var(--red);font-weight:600}

/* Controls */
.ctrl-group{display:flex;gap:6px}
.ctrl{
  background:var(--surface);color:var(--text-dim);border:none;
  padding:8px 14px;border-radius:10px;cursor:pointer;
  font-size:12px;font-weight:600;font-family:inherit;
  transition:all .2s ease;
  border:1px solid rgba(255,255,255,.04);
}
.ctrl:hover{background:rgba(59,130,246,.2);color:var(--text)}
.ctrl.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Legend */
.legend{
  bottom:24px;left:16px;
  padding:14px 18px;
  min-width:140px;
}
.legend h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text-dim);margin-bottom:8px;font-weight:600}
.lr{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;font-weight:500}
.lr:last-child{margin-bottom:0}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;
  border:2px solid rgba(255,255,255,.15)}

/* Stats bar */
.stats{
  bottom:24px;right:16px;
  padding:12px 18px;
  display:flex;gap:20px;
}
.stat{text-align:center}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-.02em}
.stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;
  letter-spacing:.06em;margin-top:2px;font-weight:500}

/* Popup override */
.leaflet-popup-content-wrapper{
  background:var(--bg-solid)!important;color:var(--text)!important;
  border-radius:12px!important;box-shadow:var(--shadow)!important;
  border:1px solid rgba(255,255,255,.08)!important;
}
.leaflet-popup-tip{background:var(--bg-solid)!important}
.leaflet-popup-content{margin:12px 16px!important;font-family:'Inter',sans-serif!important}
.pop-name{font-size:14px;font-weight:700;margin-bottom:6px}
.pop-bikes{font-size:28px;font-weight:700;margin:4px 0}
.pop-meta{font-size:11px;color:var(--text-dim);display:flex;gap:12px;margin-top:6px}

/* Zoom override */
.leaflet-control-zoom a{
  background:var(--bg)!important;color:var(--text)!important;
  border:1px solid rgba(255,255,255,.06)!important;
  backdrop-filter:blur(12px)!important;
}
.leaflet-control-zoom a:hover{background:var(--surface)!important}

/* Route mode banner */
.route-banner{
  top:80px;left:16px;right:16px;
  padding:12px 18px;display:none;
  align-items:center;gap:12px;
}
.route-banner.show{display:flex}
.route-banner .route-info{flex:1;font-size:13px;font-weight:500}
.route-banner .route-info span{color:var(--accent);font-weight:700}
.route-banner .route-clear{
  background:var(--red);color:#fff;border:none;
  padding:6px 12px;border-radius:8px;cursor:pointer;
  font-size:11px;font-weight:600;font-family:inherit;
}

/* Elevation profile */
.elev-panel{
  bottom:24px;left:16px;right:16px;
  padding:16px 20px;display:none;
}
.elev-panel.show{display:block}
.elev-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.elev-header h4{font-size:13px;font-weight:700}
.elev-stats{display:flex;gap:16px;font-size:11px;color:var(--text-dim)}
.elev-stats b{color:var(--text);font-weight:700}
#elev-canvas{width:100%;height:120px;border-radius:8px}

/* Route marker */
.route-label{
  background:var(--accent);color:#fff;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:14px;font-family:Inter,sans-serif;
  border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.5);
}

/* Mobile */
@media(max-width:640px){
  .header{top:10px;left:10px;right:10px;padding:10px 14px;flex-wrap:wrap;gap:8px}
  .header h1{font-size:14px}
  .ctrl{padding:6px 10px;font-size:11px}
  .legend{bottom:14px;left:10px;padding:10px 14px}
  .stats{bottom:14px;right:10px;padding:10px 14px;gap:14px}
  .stat-val{font-size:16px}
  .stat-label{font-size:9px}
  .route-banner{top:70px;left:10px;right:10px;padding:10px 14px}
  .elev-panel{left:10px;right:10px;bottom:10px;padding:12px 14px}
  #elev-canvas{height:90px}
}
@media(max-width:420px){
  .legend{display:none}
  .stats{left:10px;right:10px;justify-content:space-around}
  .header{flex-direction:column;align-items:flex-start;gap:6px}
  .ctrl-group{width:100%;justify-content:stretch}
  .ctrl{flex:1;text-align:center}
}
</style>
</head>
<body>
<div id="map"></div>

<div class="glass header">
  <div class="header-left">
    <span class="logo">🚲</span>
    <div>
      <h1>따릉이 맵</h1>
      <div class="status" id="status">로딩 중…</div>
    </div>
  </div>
  <div class="ctrl-group">
    <button class="ctrl" id="btn-topo" onclick="toggleTopo()">🏔 지형</button>
    <button class="ctrl on" id="btn-bike" onclick="toggleStations()">🚲 따릉이</button>
    <button class="ctrl on" id="btn-sub" onclick="toggleSubway()">🚇 지하철</button>
    <button class="ctrl" id="btn-route" onclick="toggleRouteMode()">📍 경로</button>
  </div>
</div>

<div class="glass route-banner" id="route-banner">
  <div class="route-info" id="route-info">출발 대여소를 클릭하세요</div>
  <button class="route-clear" onclick="clearRoute()">✕ 취소</button>
</div>

<div class="glass elev-panel" id="elev-panel">
  <div class="elev-header">
    <h4>📈 고도 프로필</h4>
    <div class="elev-stats" id="elev-stats"></div>
  </div>
  <canvas id="elev-canvas"></canvas>
</div>

<div class="glass legend">
  <h4>잔여 현황</h4>
  <div class="lr"><div class="dot" style="background:var(--green)"></div> 여유</div>
  <div class="lr"><div class="dot" style="background:var(--orange)"></div> 부족</div>
  <div class="lr"><div class="dot" style="background:var(--red)"></div> 없음</div>
</div>

<div class="glass stats">
  <div class="stat">
    <div class="stat-val" id="st-total">—</div>
    <div class="stat-label">대여소</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="st-avail" style="color:var(--green)">—</div>
    <div class="stat-label">이용 가능</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="st-empty" style="color:var(--red)">—</div>
    <div class="stat-label">빈 대여소</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="stations.js"></script>
<script src="subway.js"></script>
<script>
const map = L.map('map',{
  center:[37.5045,127.0489],zoom:15,
  zoomControl:false,preferCanvas:true
});
L.control.zoom({position:'bottomleft'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; CartoDB',maxZoom:19
}).addTo(map);

const topoTile=L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
  maxZoom:17,opacity:.4
});

// State
let bikeData=null, showStations=true, showSubway=true;

// Colors
const C={green:'#22c55e',orange:'#f97316',red:'#ef4444',gray:'#475569'};

function bikeColor(bikes,racks){
  if(bikes<0)return C.gray;
  if(bikes===0)return C.red;
  if(bikes/Math.max(racks,1)<.3)return C.orange;
  return C.green;
}

// === CANVAS BIKE LAYER ===
const BikeCanvas=L.Layer.extend({
  onAdd(m){
    this._map=m;
    this._c=L.DomUtil.create('canvas','');
    this._c.style.cssText='position:absolute;pointer-events:none;z-index:450';
    m.getPane('overlayPane').appendChild(this._c);
    m.on('moveend zoomend resize',this._sched,this);
    this._draw();
  },
  onRemove(m){m.off('moveend zoomend resize',this._sched,this);this._c.remove()},
  _sched(){if(this._af)cancelAnimationFrame(this._af);this._af=requestAnimationFrame(()=>this._draw())},
  _draw(){
    const m=this._map,sz=m.getSize(),c=this._c;
    c.width=sz.x;c.height=sz.y;
    L.DomUtil.setPosition(c,m.containerPointToLayerPoint([0,0]));
    const ctx=c.getContext('2d');
    if(!showStations)return;
    const b=m.getBounds(),z=m.getZoom();
    const r=z>=17?16:z>=16?14:z>=14?11:z>=12?7:5;
    const showN=z>=14,pad=.005;
    const s0=b.getSouth()-pad,n0=b.getNorth()+pad,w0=b.getWest()-pad,e0=b.getEast()+pad;
    ctx.textAlign='center';ctx.textBaseline='middle';

    for(let i=0;i<STATIONS.length;i++){
      const s=STATIONS[i];
      if(s[0]<s0||s[0]>n0||s[1]<w0||s[1]>e0)continue;
      const pt=m.latLngToContainerPoint([s[0],s[1]]);
      const info=bikeData?bikeData[s[2]]:null;
      const bikes=info?info.bikes:-1;
      const fill=bikeColor(bikes,info?info.racks:0);

      // Glow for available stations
      if(z>=14&&bikes>0){
        ctx.beginPath();ctx.arc(pt.x,pt.y,r+4,0,Math.PI*2);
        ctx.fillStyle=fill+'20';ctx.fill();
      }

      ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
      ctx.fillStyle=fill;ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=z>=14?1.5:1;ctx.stroke();

      if(showN&&bikes>=0){
        ctx.fillStyle='#fff';
        ctx.font=`700 ${r>10?12:9}px Inter,sans-serif`;
        ctx.fillText(bikes,pt.x,pt.y+.5);
      }
    }
  }
});

const bikeLayer=new BikeCanvas();
bikeLayer.addTo(map);

// Click handler moved to route mode section above

// === SUBWAY ===
const subwayLayer=L.layerGroup();
let subwayDone=false;
function getLC(l){if(!l)return'#64748b';return LINE_COLORS[l.split(',')[0]]||'#64748b'}
function renderSub(){
  if(subwayDone)return;subwayDone=true;
  for(const s of SUBWAY){
    L.marker([s[0],s[1]],{
      icon:L.divIcon({
        className:'',
        html:`<div style="background:${getLC(s[3])};color:#fff;font-size:10px;font-weight:700;
          padding:2px 6px;border-radius:8px;white-space:nowrap;
          border:1.5px solid rgba(255,255,255,.2);box-shadow:0 2px 8px rgba(0,0,0,.4);
          text-align:center">${s[2]}</div>`,
        iconSize:null,iconAnchor:[20,10]
      })
    }).bindPopup(`<div class="pop-name">🚇 ${s[2]}</div><div style="font-size:12px;color:#94a3b8">${s[3]?s[3].replace(/0(\d호선)/g,'$1'):''}</div>`)
    .addTo(subwayLayer);
  }
}
function updateSub(){
  const z=map.getZoom();
  if(showSubway&&z>=13){renderSub();if(!map.hasLayer(subwayLayer))subwayLayer.addTo(map)}
  else if(map.hasLayer(subwayLayer))map.removeLayer(subwayLayer);
}
map.on('zoomend',updateSub);updateSub();

// === GEOLOCATION ===
if(navigator.geolocation){
  navigator.geolocation.watchPosition(p=>{
    const{latitude:la,longitude:lo,accuracy:ac}=p.coords;
    if(!window._lm){
      window._lm=L.circleMarker([la,lo],{radius:8,fillColor:'#3b82f6',color:'#fff',weight:3,fillOpacity:1}).addTo(map);
      window._lr=L.circle([la,lo],{radius:ac,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:.08,weight:1,opacity:.2}).addTo(map);
      map.setView([la,lo],15);
    }else{window._lm.setLatLng([la,lo]);window._lr.setLatLng([la,lo]).setRadius(ac)}
  },()=>{},{enableHighAccuracy:true,maximumAge:10000,timeout:10000});
}

// === CONTROLS ===
function toggleTopo(){
  const b=document.getElementById('btn-topo');
  if(map.hasLayer(topoTile)){map.removeLayer(topoTile);b.classList.remove('on')}
  else{topoTile.addTo(map);b.classList.add('on')}
}
function toggleStations(){
  showStations=!showStations;
  document.getElementById('btn-bike').classList.toggle('on',showStations);
  if(showStations)bikeLayer.addTo(map);else map.removeLayer(bikeLayer);
}
function toggleSubway(){
  showSubway=!showSubway;
  document.getElementById('btn-sub').classList.toggle('on',showSubway);
  updateSub();
}

// === ROUTE MODE ===
let routeMode=false, routeA=null, routeB=null;
let routeLine=null, routeMarkers=[];

function toggleRouteMode(){
  routeMode=!routeMode;
  document.getElementById('btn-route').classList.toggle('on',routeMode);
  document.getElementById('route-banner').classList.toggle('show',routeMode);
  if(!routeMode) clearRoute();
  else document.getElementById('route-info').textContent='출발 대여소를 클릭하세요';
}

function clearRoute(){
  routeA=null;routeB=null;
  if(routeLine){map.removeLayer(routeLine);routeLine=null}
  routeMarkers.forEach(m=>map.removeLayer(m));routeMarkers=[];
  document.getElementById('elev-panel').classList.remove('show');
  document.getElementById('route-info').textContent='출발 대여소를 클릭하세요';
  // Show legend/stats again
  document.querySelector('.legend').style.display='';
  document.querySelector('.stats').style.display='';
}

function addRouteMarker(latlng, label){
  const m=L.marker(latlng,{
    icon:L.divIcon({className:'',html:`<div class="route-label">${label}</div>`,iconSize:[28,28],iconAnchor:[14,14]})
  }).addTo(map);
  routeMarkers.push(m);
}

function findNearestStation(latlng){
  let best=null,bd=Infinity;
  for(const s of STATIONS){
    const d=(s[0]-latlng.lat)**2+(s[1]-latlng.lng)**2;
    if(d<bd){bd=d;best=s}
  }
  return best;
}

async function computeRoute(a,b){
  document.getElementById('route-info').innerHTML=`<span>A</span> ${a[2]} → <span>B</span> ${b[2]} · 경로 조회 중...`;

  // OSRM cycling route
  const url=`https://router.project-osrm.org/route/v1/bike/${a[1]},${a[0]};${b[1]},${b[0]}?geometries=geojson&overview=full`;
  try{
    const res=await fetch(url);
    const data=await res.json();
    if(!data.routes||!data.routes.length) throw new Error('No route');

    const route=data.routes[0];
    const coords=route.geometry.coordinates; // [lng,lat]
    const dist=(route.distance/1000).toFixed(1);
    const mins=Math.round(route.duration/60);

    // Draw route line
    const latlngs=coords.map(c=>[c[1],c[0]]);
    if(routeLine)map.removeLayer(routeLine);
    routeLine=L.polyline(latlngs,{color:'#3b82f6',weight:5,opacity:.8,
      dashArray:null,lineCap:'round',lineJoin:'round'}).addTo(map);

    // Add shadow line
    L.polyline(latlngs,{color:'#000',weight:8,opacity:.2}).addTo(map);
    routeMarkers.push(L.polyline(latlngs,{color:'#000',weight:8,opacity:.2}));

    map.fitBounds(routeLine.getBounds(),{padding:[80,80]});

    // Sample ~40 points for elevation
    const step=Math.max(1,Math.floor(coords.length/40));
    const samples=[];
    for(let i=0;i<coords.length;i+=step) samples.push(coords[i]);
    if(samples[samples.length-1]!==coords[coords.length-1]) samples.push(coords[coords.length-1]);

    // Distances along route for x-axis
    const dists=[0];
    let totalD=0;
    for(let i=1;i<samples.length;i++){
      const dx=(samples[i][0]-samples[i-1][0])*111320*Math.cos(samples[i][1]*Math.PI/180);
      const dy=(samples[i][1]-samples[i-1][1])*110540;
      totalD+=Math.sqrt(dx*dx+dy*dy);
      dists.push(totalD);
    }

    // Fetch elevations
    const lats=samples.map(c=>c[1]).join(',');
    const lngs=samples.map(c=>c[0]).join(',');
    const elevRes=await fetch(`https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lngs}`);
    const elevData=await elevRes.json();
    const elevs=elevData.elevation||samples.map(()=>0);

    // Calculate stats
    let totalUp=0,totalDown=0;
    for(let i=1;i<elevs.length;i++){
      const diff=elevs[i]-elevs[i-1];
      if(diff>0)totalUp+=diff;else totalDown+=Math.abs(diff);
    }
    const maxElev=Math.max(...elevs), minElev=Math.min(...elevs);

    document.getElementById('route-info').innerHTML=
      `<span>A</span> ${a[2]} → <span>B</span> ${b[2]} · ${dist}km · ${mins}분`;
    document.getElementById('elev-stats').innerHTML=
      `<span>↗ <b>${Math.round(totalUp)}m</b></span>` +
      `<span>↘ <b>${Math.round(totalDown)}m</b></span>` +
      `<span>⬆ <b>${Math.round(maxElev)}m</b></span>` +
      `<span>⬇ <b>${Math.round(minElev)}m</b></span>`;

    // Draw elevation chart
    drawElevChart(dists, elevs, totalD);

    // Hide legend/stats, show elev panel
    document.querySelector('.legend').style.display='none';
    document.querySelector('.stats').style.display='none';
    document.getElementById('elev-panel').classList.add('show');

  }catch(e){
    document.getElementById('route-info').textContent=`경로 조회 실패: ${e.message}`;
  }
}

function drawElevChart(dists, elevs, totalDist){
  const canvas=document.getElementById('elev-canvas');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=rect.width, H=rect.height;

  const minE=Math.min(...elevs)-5, maxE=Math.max(...elevs)+5;
  const rangeE=maxE-minE||1;
  const pad={top:10,bottom:24,left:36,right:10};
  const cw=W-pad.left-pad.right, ch=H-pad.top-pad.bottom;

  function x(d){return pad.left+d/totalDist*cw}
  function y(e){return pad.top+ch-(e-minE)/rangeE*ch}

  // Grid
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
  for(let e=Math.ceil(minE/10)*10;e<=maxE;e+=10){
    ctx.beginPath();ctx.moveTo(pad.left,y(e));ctx.lineTo(W-pad.right,y(e));ctx.stroke();
    ctx.fillStyle='#64748b';ctx.font='10px Inter,sans-serif';ctx.textAlign='right';
    ctx.fillText(`${Math.round(e)}m`,pad.left-4,y(e)+3);
  }

  // Gradient fill
  const grad=ctx.createLinearGradient(0,pad.top,0,H-pad.bottom);
  grad.addColorStop(0,'rgba(239,68,68,.4)');
  grad.addColorStop(0.4,'rgba(249,115,22,.25)');
  grad.addColorStop(1,'rgba(34,197,94,.08)');

  ctx.beginPath();
  ctx.moveTo(x(dists[0]),H-pad.bottom);
  for(let i=0;i<elevs.length;i++) ctx.lineTo(x(dists[i]),y(elevs[i]));
  ctx.lineTo(x(dists[dists.length-1]),H-pad.bottom);
  ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();
  for(let i=0;i<elevs.length;i++){
    const px=x(dists[i]),py=y(elevs[i]);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.strokeStyle='#f97316';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();

  // Dots at steep sections
  for(let i=1;i<elevs.length;i++){
    const diff=elevs[i]-elevs[i-1];
    if(Math.abs(diff)>3){
      ctx.beginPath();ctx.arc(x(dists[i]),y(elevs[i]),3,0,Math.PI*2);
      ctx.fillStyle=diff>0?'#ef4444':'#22c55e';ctx.fill();
    }
  }

  // A / B labels
  ctx.fillStyle='#3b82f6';ctx.font='bold 12px Inter,sans-serif';ctx.textAlign='center';
  ctx.fillText('A',x(dists[0]),H-pad.bottom+14);
  ctx.fillText('B',x(dists[dists.length-1]),H-pad.bottom+14);
}

// Override click handler to support route mode
const origClick=map._events.click;
map.off('click');
map.on('click',e=>{
  if(routeMode){
    // Find nearest station
    const cp=map.latLngToContainerPoint(e.latlng),z=map.getZoom();
    const r=z>=17?16:z>=16?14:z>=14?11:z>=12?7:5;
    let best=null,bd=Infinity;
    for(const s of STATIONS){
      const pt=map.latLngToContainerPoint([s[0],s[1]]);
      const d=(pt.x-cp.x)**2+(pt.y-cp.y)**2;
      if(d<(r+10)**2&&d<bd){bd=d;best=s}
    }
    if(!best){
      // Also allow clicking anywhere — snap to nearest
      best=findNearestStation(e.latlng);
    }
    if(!best)return;

    if(!routeA){
      routeA=best;
      addRouteMarker([best[0],best[1]],'A');
      document.getElementById('route-info').innerHTML=`<span>A</span> ${best[2]} → 도착 대여소를 클릭하세요`;
    }else if(!routeB){
      routeB=best;
      addRouteMarker([best[0],best[1]],'B');
      computeRoute(routeA,routeB);
    }
    return;
  }

  // Normal click
  if(!showStations)return;
  const cp=map.latLngToContainerPoint(e.latlng),z=map.getZoom();
  const r=z>=17?16:z>=16?14:z>=14?11:z>=12?7:5;
  let best=null,bd=Infinity;
  for(let i=0;i<STATIONS.length;i++){
    const s=STATIONS[i],pt=map.latLngToContainerPoint([s[0],s[1]]);
    const d=(pt.x-cp.x)**2+(pt.y-cp.y)**2;
    if(d<(r+6)**2&&d<bd){bd=d;best=s}
  }
  if(!best)return;
  const info=bikeData?bikeData[best[2]]:null;
  const bikes=info?info.bikes:'—';
  const racks=info?info.racks:best[3];
  const pct=info?Math.round(info.bikes/Math.max(info.racks,1)*100):0;
  const col=bikeColor(info?info.bikes:-1,racks);
  L.popup({className:'dark-popup'})
    .setLatLng([best[0],best[1]])
    .setContent(`
      <div class="pop-name">${best[2]}</div>
      <div class="pop-bikes" style="color:${col}">${bikes}<span style="font-size:14px;color:#94a3b8"> 대</span></div>
      <div class="pop-meta">
        <span>거치대 ${racks}개</span>
        <span>고도 ${best[4]}m</span>
        ${info?`<span>${pct}%</span>`:''}
      </div>`)
    .openOn(map);
});

// === DATA ===
document.getElementById('st-total').textContent=STATIONS.length.toLocaleString();

fetch('/api/bikes').then(r=>r.json()).then(data=>{
  bikeData=data;
  bikeLayer._draw();

  // Stats
  let avail=0,empty=0;
  for(const s of STATIONS){
    const info=data[s[2]];
    if(info){
      if(info.bikes>0)avail++;
      else empty++;
    }
  }
  document.getElementById('st-avail').textContent=avail.toLocaleString();
  document.getElementById('st-empty').textContent=empty.toLocaleString();
  document.getElementById('status').innerHTML='<span class="live">● LIVE</span>';
}).catch(()=>{
  document.getElementById('status').innerHTML='<span class="offline">● 오프라인</span>';
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 고도 지도 × 따릉이</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#map { width: 100vw; height: 100vh; }
.legend {
  position: absolute; bottom: 30px; right: 10px; z-index: 1000;
  background: rgba(0,0,0,0.85); color: #fff; padding: 12px 16px;
  border-radius: 10px; font-size: 13px; line-height: 1.6;
  backdrop-filter: blur(8px);
}
.legend h4 { margin-bottom: 6px; font-size: 14px; }
.legend-row { display: flex; align-items: center; gap: 8px; }
.legend-color { width: 20px; height: 14px; border-radius: 3px; }
.info-panel {
  position: absolute; top: 10px; left: 60px; z-index: 1000;
  background: rgba(0,0,0,0.85); color: #fff; padding: 12px 18px;
  border-radius: 10px; font-size: 14px;
  backdrop-filter: blur(8px);
}
.info-panel h3 { margin-bottom: 4px; }
.info-panel .count { color: #4ade80; font-weight: bold; }
.controls {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  display: flex; flex-direction: column; gap: 6px;
}
.controls button {
  background: rgba(0,0,0,0.85); color: #fff; border: none;
  padding: 8px 14px; border-radius: 8px; cursor: pointer;
  font-size: 13px; backdrop-filter: blur(8px);
  transition: background 0.2s;
}
.controls button:hover { background: rgba(60,60,60,0.9); }
.controls button.active { background: rgba(59,130,246,0.8); }
.station-popup { font-size: 13px; line-height: 1.5; }
.station-popup b { color: #2563eb; }
.elev-label { font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div id="map"></div>

<div class="info-panel">
  <h3>🚲 서울 고도 × 따릉이</h3>
  <div>대여소 <span class="count" id="station-count">0</span>개 로딩 중...</div>
</div>

<div class="controls">
  <button id="btn-elevation" class="active" onclick="toggleElevation()">🏔 고도 레이어</button>
  <button id="btn-stations" class="active" onclick="toggleStations()">🚲 따릉이</button>
  <button id="btn-heatmap" onclick="toggleHeatmap()">🔥 고도 히트맵</button>
</div>

<div class="legend">
  <h4>고도 (m)</h4>
  <div class="legend-row"><div class="legend-color" style="background:#1a237e"></div> 0–20m</div>
  <div class="legend-row"><div class="legend-color" style="background:#1565c0"></div> 20–40m</div>
  <div class="legend-row"><div class="legend-color" style="background:#43a047"></div> 40–80m</div>
  <div class="legend-row"><div class="legend-color" style="background:#f9a825"></div> 80–150m</div>
  <div class="legend-row"><div class="legend-color" style="background:#e65100"></div> 150–300m</div>
  <div class="legend-row"><div class="legend-color" style="background:#b71c1c"></div> 300m+</div>
  <div style="margin-top:8px; border-top:1px solid #555; padding-top:6px;">
    <div class="legend-row">🟢 따릉이 대여소</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Seoul center
const SEOUL_CENTER = [37.5665, 126.9780];
const map = L.map('map', {
  center: SEOUL_CENTER,
  zoom: 12,
  zoomControl: false
});

L.control.zoom({ position: 'bottomleft' }).addTo(map);

// Base tile (dark)
const baseTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CartoDB &copy; OSM',
  maxZoom: 19
}).addTo(map);

// Elevation tile layer using Stadia/Stamen Terrain
const elevationTile = L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; Stamen &copy; OSM',
  maxZoom: 18,
  opacity: 0.4
}).addTo(map);

// Station markers layer
const stationLayer = L.layerGroup().addTo(map);
// Heatmap canvas layer
let heatmapLayer = null;
let stationsData = [];

// Elevation color
function elevColor(elev) {
  if (elev < 20) return '#1a237e';
  if (elev < 40) return '#1565c0';
  if (elev < 80) return '#43a047';
  if (elev < 150) return '#f9a825';
  if (elev < 300) return '#e65100';
  return '#b71c1c';
}

// Fetch elevation for a batch of coordinates using Open-Meteo
async function getElevations(coords) {
  const lats = coords.map(c => c[0]).join(',');
  const lngs = coords.map(c => c[1]).join(',');
  const url = `https://api.open-meteo.com/v1/elevation?latitude=${lats}&longitude=${lngs}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.elevation || [];
}

// Load stations
async function loadStations() {
  // Fetch live from Seoul bike API
  let stations = [];
  try {
    const res = await fetch('https://www.bikeseoul.com/app/station/getStationRealtimeStatus.do', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'stationGrpSeq=ALL'
    });
    const data = await res.json();
    const list = data.realtimeList || [];
    stations = list.filter(s => parseFloat(s.stationLatitude) > 0).map(s => ({
      id: s.stationId,
      name: s.stationName,
      lat: parseFloat(s.stationLatitude),
      lng: parseFloat(s.stationLongitude),
      racks: parseInt(s.rackTotCnt || '0'),
      bikes: parseInt(s.parkingBikeTotCnt || '0')
    }));
  } catch(e) {
    console.warn('Live API failed, using embedded data');
    // Fallback: load from embedded
    stations = window.__stations || [];
  }
  
  stationsData = stations;
  document.getElementById('station-count').textContent = stations.length;
  document.querySelector('.info-panel div').innerHTML = 
    `대여소 <span class="count">${stations.length}</span>개 · 고도 조회 중...`;

  // Get elevations in batches of 100
  const BATCH = 100;
  for (let i = 0; i < stations.length; i += BATCH) {
    const batch = stations.slice(i, i + BATCH);
    const coords = batch.map(s => [s.lat, s.lng]);
    try {
      const elevs = await getElevations(coords);
      for (let j = 0; j < batch.length; j++) {
        batch[j].elevation = elevs[j] || 0;
      }
    } catch(e) {
      console.warn(`Elevation batch ${i} failed`, e);
      batch.forEach(s => s.elevation = 0);
    }
    // Update progress
    const done = Math.min(i + BATCH, stations.length);
    document.querySelector('.info-panel div').innerHTML = 
      `대여소 <span class="count">${stations.length}</span>개 · 고도 ${done}/${stations.length}`;
  }

  // Render markers
  renderStations();
  
  document.querySelector('.info-panel div').innerHTML = 
    `대여소 <span class="count">${stations.length}</span>개 · 고도 데이터 완료 ✅`;
}

function renderStations() {
  stationLayer.clearLayers();
  stationsData.forEach(s => {
    const elev = s.elevation || 0;
    const color = elevColor(elev);
    const circle = L.circleMarker([s.lat, s.lng], {
      radius: 5,
      fillColor: color,
      color: '#fff',
      weight: 1,
      opacity: 0.8,
      fillOpacity: 0.85
    });
    circle.bindPopup(`
      <div class="station-popup">
        <b>${s.name}</b><br>
        🚲 자전거: ${s.bikes}대 / 거치대: ${s.racks}개<br>
        <span class="elev-label">🏔 고도: ${elev.toFixed(1)}m</span>
      </div>
    `);
    stationLayer.addLayer(circle);
  });
}

// Heatmap using canvas overlay
function createHeatmap() {
  if (heatmapLayer) {
    map.removeLayer(heatmapLayer);
    heatmapLayer = null;
    return null;
  }
  
  const canvas = L.DomUtil.create('canvas');
  const overlay = L.imageOverlay('', map.getBounds(), { opacity: 0.5 });
  
  // Simple grid-based elevation heatmap
  const HeatmapCanvasLayer = L.Layer.extend({
    onAdd(map) {
      this._map = map;
      this._canvas = L.DomUtil.create('canvas', 'leaflet-heatmap-layer');
      const pane = map.getPane('overlayPane');
      pane.appendChild(this._canvas);
      this._canvas.style.position = 'absolute';
      this._canvas.style.pointerEvents = 'none';
      map.on('moveend zoomend resize', this._redraw, this);
      this._redraw();
    },
    onRemove(map) {
      map.off('moveend zoomend resize', this._redraw, this);
      this._canvas.remove();
    },
    _redraw() {
      const size = this._map.getSize();
      this._canvas.width = size.x;
      this._canvas.height = size.y;
      const topLeft = this._map.containerPointToLayerPoint([0, 0]);
      L.DomUtil.setPosition(this._canvas, topLeft);
      
      const ctx = this._canvas.getContext('2d');
      ctx.clearRect(0, 0, size.x, size.y);
      
      stationsData.forEach(s => {
        const pt = this._map.latLngToContainerPoint([s.lat, s.lng]);
        const elev = s.elevation || 0;
        const color = elevColor(elev);
        const radius = Math.max(15, 40 - this._map.getZoom() * 2);
        
        const gradient = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, radius);
        gradient.addColorStop(0, color + 'aa');
        gradient.addColorStop(1, color + '00');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
        ctx.fill();
      });
    }
  });
  
  heatmapLayer = new HeatmapCanvasLayer();
  heatmapLayer.addTo(map);
  return heatmapLayer;
}

// Toggle controls
function toggleElevation() {
  const btn = document.getElementById('btn-elevation');
  if (map.hasLayer(elevationTile)) {
    map.removeLayer(elevationTile);
    btn.classList.remove('active');
  } else {
    elevationTile.addTo(map);
    btn.classList.add('active');
  }
}

function toggleStations() {
  const btn = document.getElementById('btn-stations');
  if (map.hasLayer(stationLayer)) {
    map.removeLayer(stationLayer);
    btn.classList.remove('active');
  } else {
    stationLayer.addTo(map);
    btn.classList.add('active');
  }
}

function toggleHeatmap() {
  const btn = document.getElementById('btn-heatmap');
  if (heatmapLayer) {
    map.removeLayer(heatmapLayer);
    heatmapLayer = null;
    btn.classList.remove('active');
  } else {
    createHeatmap();
    btn.classList.add('active');
  }
}

// Init
loadStations();
</script>
</body>
</html>

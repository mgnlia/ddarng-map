<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서울 고도 지도 × 따릉이</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#map { width: 100vw; height: 100vh; }
.legend {
  position: absolute; bottom: 30px; right: 10px; z-index: 1000;
  background: rgba(0,0,0,0.85); color: #fff; padding: 12px 16px;
  border-radius: 10px; font-size: 13px; line-height: 1.6;
  backdrop-filter: blur(8px);
}
.legend h4 { margin-bottom: 6px; font-size: 14px; }
.legend-row { display: flex; align-items: center; gap: 8px; }
.legend-color { width: 20px; height: 14px; border-radius: 3px; }
.info-panel {
  position: absolute; top: 10px; left: 60px; z-index: 1000;
  background: rgba(0,0,0,0.85); color: #fff; padding: 12px 18px;
  border-radius: 10px; font-size: 14px;
  backdrop-filter: blur(8px);
}
.info-panel h3 { margin-bottom: 4px; }
.controls {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  display: flex; flex-direction: column; gap: 6px;
}
.controls button {
  background: rgba(0,0,0,0.85); color: #fff; border: none;
  padding: 8px 14px; border-radius: 8px; cursor: pointer;
  font-size: 13px; backdrop-filter: blur(8px);
  transition: background 0.2s;
}
.controls button:hover { background: rgba(60,60,60,0.9); }
.controls button.active { background: rgba(59,130,246,0.8); }
.station-popup { font-size: 13px; line-height: 1.5; }
.station-popup b { color: #2563eb; }
</style>
</head>
<body>
<div id="map"></div>

<div class="info-panel">
  <h3>🚲 서울 고도 × 따릉이</h3>
  <div id="info-text">로딩 중...</div>
</div>

<div class="controls">
  <button id="btn-topo" class="active" onclick="toggleTopo()">🏔 지형</button>
  <button id="btn-stations" class="active" onclick="toggleStations()">🚲 따릉이</button>
</div>

<div class="legend">
  <h4>고도 (m)</h4>
  <div class="legend-row"><div class="legend-color" style="background:#1a237e"></div> 0–20m</div>
  <div class="legend-row"><div class="legend-color" style="background:#1565c0"></div> 20–40m</div>
  <div class="legend-row"><div class="legend-color" style="background:#43a047"></div> 40–80m</div>
  <div class="legend-row"><div class="legend-color" style="background:#f9a825"></div> 80–150m</div>
  <div class="legend-row"><div class="legend-color" style="background:#e65100"></div> 150–300m</div>
  <div class="legend-row"><div class="legend-color" style="background:#b71c1c"></div> 300m+</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="stations.js"></script>
<script>
// STATIONS = [[lat, lng, name, racks, elevation], ...]
const map = L.map('map', {
  center: [37.5045, 127.0489], // 선정릉역
  zoom: 15,
  zoomControl: false,
  preferCanvas: true  // Canvas renderer for performance
});
L.control.zoom({ position: 'bottomleft' }).addTo(map);

const baseTile = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CartoDB &copy; OSM', maxZoom: 19
}).addTo(map);

const topoTile = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenTopoMap', maxZoom: 17, opacity: 0.45
}).addTo(map);

function elevColor(e) {
  if (e < 20) return '#1a237e';
  if (e < 40) return '#1565c0';
  if (e < 80) return '#43a047';
  if (e < 150) return '#f9a825';
  if (e < 300) return '#e65100';
  return '#b71c1c';
}

// Render all stations instantly using canvas renderer
const stationLayer = L.layerGroup().addTo(map);

for (const s of STATIONS) {
  const [lat, lng, name, racks, elev] = s;
  L.circleMarker([lat, lng], {
    radius: 5,
    fillColor: elevColor(elev),
    color: '#fff',
    weight: 0.8,
    opacity: 0.7,
    fillOpacity: 0.85
  }).bindPopup(
    `<div class="station-popup"><b>${name}</b><br>거치대: ${racks}개<br>🏔 고도: ${elev}m</div>`
  ).addTo(stationLayer);
}

document.getElementById('info-text').textContent = `대여소 ${STATIONS.length}개 · 고도 포함`;

// 현재 위치 표시
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    const {latitude: lat, longitude: lng, accuracy} = pos.coords;
    if (!window._locMarker) {
      window._locMarker = L.circleMarker([lat, lng], {
        radius: 8, fillColor: '#3b82f6', color: '#fff', weight: 3, fillOpacity: 1
      }).addTo(map).bindPopup('📍 현재 위치');
      window._locRadius = L.circle([lat, lng], {
        radius: accuracy, color: '#3b82f6', fillColor: '#3b82f6',
        fillOpacity: 0.1, weight: 1, opacity: 0.3
      }).addTo(map);
      map.setView([lat, lng], 15);
    } else {
      window._locMarker.setLatLng([lat, lng]);
      window._locRadius.setLatLng([lat, lng]).setRadius(accuracy);
    }
  }, err => console.warn('Geolocation error:', err), {
    enableHighAccuracy: true, maximumAge: 10000, timeout: 10000
  });
}

function toggleTopo() {
  const btn = document.getElementById('btn-topo');
  if (map.hasLayer(topoTile)) { map.removeLayer(topoTile); btn.classList.remove('active'); }
  else { topoTile.addTo(map); btn.classList.add('active'); }
}
function toggleStations() {
  const btn = document.getElementById('btn-stations');
  if (map.hasLayer(stationLayer)) { map.removeLayer(stationLayer); btn.classList.remove('active'); }
  else { stationLayer.addTo(map); btn.classList.add('active'); }
}
</script>
</body>
</html>
